      <div style={{ background: "#fff", borderRadius: 16, padding: "4px 4px 4px 16px", border: "1.5px solid #E8DAD0", display: "flex", alignItems: "center", gap: 8 }}>
        <input value={input} onChange={(e) => setInput(e.target.value)}
        onKeyDown={(e) => e.key === "Enter" && add(input)}
        placeholder="Добавить товар..."
        style={{ flex: 1, border: "none", outline: "none", fontSize: 14, background: "transparent", color: "#1C1610", padding: "10px 0", fontFamily: "inherit" }} />
        <button onClick={() => add(input)} disabled={!input.trim()}
        style={{ width: 36, height: 36, border: "none", borderRadius: 12, background: input.trim() ? "#FF6A00" : "#F5EDE4", color: "#fff", fontSize: 20, fontWeight: 700, cursor: input.trim() ? "pointer" : "default", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
      </div>

      {/* Suggestions */}
      {suggestions.length > 0 &&
      <div>
          <div style={{ fontSize: 11, color: "#B09E92", marginBottom: 6 }}>Из ваших обычных покупок</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {suggestions.slice(0, 5).map((s, i) =>
          <button key={i} onClick={() => add(s)} style={{ padding: "6px 12px", background: "#FFF4EC", border: "1px solid #FFC999", borderRadius: 20, color: "#FF6A00", fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>+ {s}</button>
          )}
          </div>
        </div>
      }

      {/* Progress */}
      {done > 0 &&
      <div style={{ background: "#F7F5F2", borderRadius: 14, padding: "10px 14px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <span style={{ fontSize: 12, color: "#8C7A6E" }}>Куплено {done} из {items.length}</span>
            <button onClick={clearDone} style={{ background: "none", border: "none", color: "#FF6A00", fontSize: 12, fontWeight: 600, cursor: "pointer", padding: 0 }}>Убрать купленные</button>
          </div>
          <div style={{ background: "#E8DAD0", borderRadius: 6, height: 4, overflow: "hidden" }}>
            <div style={{ width: `${done / items.length * 100}%`, height: "100%", background: "#FF6A00", borderRadius: 6, transition: "width 0.3s" }} />
          </div>
        </div>
      }

      {/* List */}
      <div style={{ background: "#fff", borderRadius: 20, overflow: "hidden", border: "1px solid #F0EDE8" }}>
        {items.length === 0 ?
        <div style={{ padding: 32, textAlign: "center" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>🛒</div>
            <div style={{ fontSize: 14, color: "#8C7A6E" }}>Список пуст</div>
          </div> :
        items.map((item, i) =>
        <div key={i} style={{
          display: "flex", alignItems: "center", gap: 12, padding: "13px 16px",
          borderBottom: i < items.length - 1 ? "1px solid #F7F5F2" : "none",
          background: item.done ? "#FAFDF9" : "#fff"
        }}>
            <button onClick={() => toggle(i)} style={{
            width: 24, height: 24, borderRadius: 7, border: `2px solid ${item.done ? "#34C759" : "#D4C4B8"}`,
            background: item.done ? "#34C759" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0
          }}>{item.done && <svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" /></svg>}</button>
            <span style={{ flex: 1, fontSize: 14, fontWeight: 500, color: item.done ? "#B09E92" : "#1C1610", textDecoration: item.done ? "line-through" : "none" }}>{item.text}</span>
            <button onClick={() => remove(i)} style={{ background: "none", border: "none", color: "#D4C4B8", fontSize: 20, cursor: "pointer", lineHeight: 1, padding: "0 2px" }}>×</button>
          </div>
        )}
      </div>
    </div>);

};


// ─── BASKET SCREEN ───────────────────────────────────────────
const BasketScreen = () => {
  const [subtab, setSubtab] = useState("stats");
  const spent = data.spent;
  const daysInMonth = 30;
  const daysPassed = daysInMonth - data.daysLeft;
  const avgDaily = Math.round(spent / daysPassed);
  const projected = Math.round(avgDaily * daysInMonth);

  const maxCat = Math.max(...data.categories.map((c) => c.amount));
  const maxW = Math.max(...data.weeklyAvg.map((w) => w.avg));

  const subtabs = [
  { id: "stats", label: "Главное" },
  { id: "insights", label: "Инсайты" },
  { id: "list", label: "🛒 Список" }];


  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden", position: "relative" }}>
      {/* Header */}
      <div style={{ background: "#fff", padding: "14px 20px 0", borderBottom: "1px solid #F0EDE8", flexShrink: 0 }}>
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#1C1610", letterSpacing: -0.3 }}>Экономия</div>
        </div>
        {/* Subtabs */}
        <div style={{ display: "flex", gap: 4, overflowX: "auto", scrollbarWidth: "none", paddingBottom: 12 }}>
          {subtabs.map((t) =>
          <button key={t.id} onClick={() => setSubtab(t.id)} style={{
            padding: "7px 14px", borderRadius: 20, border: "none", cursor: "pointer", flexShrink: 0, fontFamily: "inherit",
            fontSize: 13, fontWeight: 600, whiteSpace: "nowrap",
            background: subtab === t.id ? "#FF6A00" : "#F5EDE4",
            color: subtab === t.id ? "#fff" : "#8C7A6E"
          }}>{t.label}</button>
          )}
        </div>
      </div>

      <div className="scroll" style={{ flex: 1, background: "#F7F5F2", padding: "14px 16px 24px" }}>

        {/* STATS */}
        {subtab === "stats" &&
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {/* Hero */}
            <div style={{ background: "#FF6A00", borderRadius: 24, padding: "22px 24px", position: "relative", overflow: "hidden" }}>
              <div style={{ position: "absolute", top: -30, right: -20, width: 120, height: 120, background: "rgba(255,255,255,0.08)", borderRadius: "50%" }} />
              <div style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.8)", letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 4 }}>Потрачено в апреле на еду</div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 4, marginBottom: 4 }}>
                <span style={{ fontSize: 44, fontWeight: 600, color: "#fff", letterSpacing: -0.5 }}>{spent.toLocaleString("ru")}</span>
                <span style={{ fontSize: 20, color: "rgba(255,255,255,0.8)", fontWeight: 600 }}>₽</span>
              </div>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.85)", marginBottom: 16 }}>
                ~<b>{avgDaily} ₽/день</b> · прошло {daysPassed} из {daysInMonth} дней
              </div>
              <div style={{ background: "rgba(255,255,255,0.25)", borderRadius: 8, height: 6, overflow: "hidden", marginBottom: 6 }}>
                <div style={{ width: `${Math.round(daysPassed / daysInMonth * 100)}%`, height: "100%", background: "#fff", borderRadius: 8 }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <span style={{ color: "rgba(255,255,255,0.7)", fontSize: 11 }}>осталось {data.daysLeft} дней</span>
                <span style={{ color: "rgba(255,255,255,0.7)", fontSize: 11 }}>прогноз: ~{projected.toLocaleString("ru")} ₽</span>
              </div>
            </div>

            {/* Cashback + vs prev */}
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1, background: "#fff", borderRadius: 18, padding: "14px" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#FF6A00", letterSpacing: 0.6, textTransform: "uppercase", marginBottom: 6 }}>Кешбэк</div>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ fontSize: 22, fontWeight: 600, color: "#1C1610" }}>{data.cashbackPoints.toLocaleString("ru")}</span>
                  <span style={{ fontSize: 14, color: "#FF6A00" }}>✦</span>
                </div>
                <div style={{ fontSize: 11, color: "#B09E92", marginTop: 2 }}>= 340 ₽</div>
              </div>
              <div style={{ flex: 1, background: "#fff", borderRadius: 18, padding: "14px" }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#8C7A6E", letterSpacing: 0.6, textTransform: "uppercase", marginBottom: 6 }}>Vs прошлый мес.</div>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ color: "#34C759", fontSize: 16 }}>↓</span>
                  <span style={{ fontSize: 22, fontWeight: 600, color: "#1C1610" }}>{(data.prevMonthSpent - spent).toLocaleString("ru")}</span>
                  <span style={{ fontSize: 13, color: "#8C7A6E" }}>₽</span>
                </div>
                <div style={{ fontSize: 11, color: "#B09E92", marginTop: 2 }}>было {data.prevMonthSpent.toLocaleString("ru")} ₽</div>
              </div>
            </div>

            {/* Deals */}
            <div style={{ background: "#fff", borderRadius: 20, padding: "16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                <div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "#1C1610" }}>Акции на твои продукты</div>
                  <div style={{ fontSize: 11, color: "#B09E92", marginTop: 2 }}>Товары которые ты обычно берёшь</div>
                </div>
                <div style={{ background: "#FFF4EC", borderRadius: 10, padding: "4px 10px" }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: "#FF6A00" }}>4 товара</span>
                </div>
              </div>
              {data.deals.map((deal, i) =>
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: i < data.deals.length - 1 ? "1px solid #F7F5F2" : "none" }}>
                  <div style={{ width: 42, height: 42, background: "#FFF4EC", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>{deal.emoji}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#1C1610", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{deal.name}</div>
                    <div style={{ fontSize: 11, color: "#B09E92", marginTop: 2 }}>{deal.store}</div>
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ fontSize: 12, color: "#B09E92", textDecoration: "line-through" }}>{deal.oldPrice} ₽</span>
                      <span style={{ fontSize: 15, fontWeight: 700, color: "#FF6A00" }}>{deal.newPrice} ₽</span>
                    </div>
                    <div style={{ background: "#FFF4EC", borderRadius: 6, padding: "2px 6px", marginTop: 3, display: "inline-block" }}>
                      <span style={{ fontSize: 11, fontWeight: 700, color: "#FF6A00" }}>−{deal.discount}%</span>
                    </div>
                  </div>
                </div>
              )}
              <div style={{ marginTop: 14, padding: "11px", background: "#FFF4EC", borderRadius: 12, textAlign: "center", cursor: "pointer" }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: "#FF6A00" }}>Добавить всё в список →</span>
              </div>
            </div>

            {/* Bar chart */}
            <div style={{ background: "#fff", borderRadius: 20, padding: "18px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#8C7A6E", letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 4 }}>Средние траты / неделю</div>
                  <div style={{ fontSize: 28, fontWeight: 600, color: "#1C1610", letterSpacing: -0.5 }}>2 400 ₽</div>
                </div>
                <div style={{ background: "#EDF7EE", borderRadius: 10, padding: "5px 10px" }}>
                  <span style={{ color: "#34C759", fontSize: 12, fontWeight: 600 }}>↑ +7%</span>
                </div>
              </div>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 80 }}>
                {data.weeklyAvg.map((d, i) => {
                const isLast = i === data.weeklyAvg.length - 1;
                const h = Math.round(d.avg / maxW * 60);
                return (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                      <div style={{ width: "100%", height: `${h}px`, background: isLast ? "#FF6A00" : "#FFE4CC", borderRadius: "6px 6px 4px 4px" }} />
                      <span style={{ fontSize: 10, fontWeight: isLast ? 700 : 400, color: isLast ? "#FF6A00" : "#B09E92" }}>{d.month}</span>
                    </div>);
              })}
              </div>
            </div>

            {/* Categories */}
            <div style={{ background: "#fff", borderRadius: 20, padding: "18px" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#1C1610", marginBottom: 14 }}>Траты по категориям</div>
              {data.categories.map((cat, i) => {
              const isUp = cat.amount > cat.prev;
              return (
                <div key={i} style={{ marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: "#1C1610" }}>{cat.name}</span>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ color: isUp ? "#FF3B30" : "#34C759", fontSize: 11, fontWeight: 600 }}>
                          {isUp ? "↑" : "↓"} {Math.abs(cat.amount - cat.prev)} ₽
                        </span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: "#1C1610" }}>{cat.amount.toLocaleString("ru")} ₽</span>
                      </div>
                    </div>
                    <div style={{ background: "#F0EDE8", borderRadius: 6, height: 5, overflow: "hidden" }}>
                      <div style={{ width: `${Math.round(cat.amount / maxCat * 100)}%`, height: "100%", background: cat.color, borderRadius: 6 }} />
                    </div>
                  </div>);
            })}
            </div>

            {/* Price growth */}
            <div style={{ background: "#FFFBEC", border: "1.5px solid #FFE58A", borderRadius: 20, padding: "16px" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#B8860B", marginBottom: 6 }}>Ваши цены растут</div>
              <div style={{ fontSize: 15, fontWeight: 700, color: "#1C1610", marginBottom: 2 }}>Корзина подорожала на <span style={{ color: "#FF9A00" }}>340 ₽</span></div>
              <div style={{ fontSize: 12, color: "#8C7A6E" }}>+8% за последние 2 месяца</div>
            </div>
          </div>
        }

        {/* INSIGHTS */}
        {subtab === "insights" &&
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ background: "#fff", borderRadius: 20, padding: "18px" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#1C1610", marginBottom: 14 }}>Ваши фавориты в этом году</div>
              {data.favorites.map((item, i) =>
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: i < data.favorites.length - 1 ? "1px solid #F7F5F2" : "none" }}>
                  <div style={{ width: 36, height: 36, background: "#FFF4EC", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    <span style={{ fontSize: 16 }}>{["🥛", "🍞", "🧀"][i]}</span>
                  </div>
                  <span style={{ flex: 1, fontSize: 14, fontWeight: 600, color: "#1C1610" }}>{item.name}</span>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 16, fontWeight: 600, color: "#FF6A00" }}>{item.count}×</div>
                    <div style={{ fontSize: 10, color: "#B09E92" }}>в этом году</div>
                  </div>
                </div>
            )}
            </div>

            <div style={{ background: "#fff", borderRadius: 20, padding: "16px" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#1C1610", marginBottom: 14 }}>Ваши привычки</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {[
                  { emoji: "📍", label: "Любимый магазин", value: "Пятёрочка на Тверской", sub: "34 визита" },
                  { emoji: "🕕", label: "Обычное время", value: "После 18:00", sub: "78% покупок" },
                  { emoji: "🧾", label: "Средний чек", value: "620 ₽", sub: "в этом месяце" },
                  { emoji: "🔁", label: "Частая покупка", value: "Молоко", sub: "каждые 5 дней" },
                ].map((row, i) =>
                  <div key={i} style={{
                    background: "#F7F5F2", borderRadius: 16, padding: "14px 12px",
                    display: "flex", flexDirection: "column", gap: 6,
                  }}>
                    <div style={{
                      width: 36, height: 36, borderRadius: 10,
                      background: "#FFF4EC", display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 18, marginBottom: 2,
                    }}>{row.emoji}</div>
                    <div style={{ fontSize: 11, color: "#B09E92", fontWeight: 500 }}>{row.label}</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "#1C1610", lineHeight: 1.2 }}>{row.value}</div>
                    <div style={{ fontSize: 11, color: "#FF6A00", fontWeight: 600 }}>{row.sub}</div>
                  </div>
                )}
              </div>
            </div>

            <div style={{ background: "linear-gradient(135deg,#FF6A00,#FF9133)", borderRadius: 20, padding: "20px", textAlign: "center" }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.8)", textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>За этот год потрачено на еду</div>
              <div style={{ fontSize: 40, fontWeight: 600, color: "#fff", letterSpacing: -0.5, marginBottom: 4 }}>87 400 ₽</div>
              <div style={{ fontSize: 13, color: "rgba(255,255,255,0.8)", marginBottom: 6 }}>вернулось кешбэком</div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                <span style={{ fontSize: 28, fontWeight: 600, color: "#fff" }}>9 614</span>
                <span style={{ fontSize: 18 }}>✦</span>
              </div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", marginTop: 4 }}>= 9 614 ₽</div>
            </div>
          </div>
        }

        {/* LIST */}
        {subtab === "list" && <ShoppingList />}
      </div>
    </div>);

};

// ─── STUB SCREENS ─────────────────────────────────────────────
const StubScreen = ({ title, emoji }) =>
<div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "#F7F5F2", gap: 12 }}>
    <div style={{ fontSize: 48 }}>{emoji}</div>
    <div style={{ fontSize: 18, fontWeight: 700, color: "#1C1610" }}>{title}</div>
    <div style={{ fontSize: 13, color: "#B09E92" }}>
</div>
  </div>;

// ─── APP ─────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("home");

  return (
    <div className="phone">
      {tab === "home" && <HomeScreen setTab={setTab} />}
      {tab === "benefit" && <StubScreen title="Выгода" emoji="🎁" />}
      {tab === "basket" && <BasketScreen />}
      {tab === "card" && <StubScreen title="Карта" emoji="💳" />}
      {tab === "profile" && <StubScreen title="Профиль" emoji="👤" />}
      <BottomNav tab={tab} setTab={setTab} />
    </div>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<div id="root"></div>
</body>
